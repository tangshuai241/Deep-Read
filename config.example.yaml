# DeepRead 配置文件样例
# 复制为 config.yaml 后修改，或运行 python init.py 生成

user:
  name: "读者"
  preferred_name: "读者"

paths:
  books_dir: "~/books"                          # EPUB 书籍目录
  vault_dir: "~/Documents/知识库"               # Obsidian vault 目录
  notes_dir: "~/Documents/知识库/读书/笔记"     # 笔记保存目录
  state_dir: "./state"                          # 状态文件目录（相对路径 = deepread/state）
  reading_notes: "./reading-notes.md"
  cognition_profile: "./cognition_profile.json"
  wiki_integration_dir: "~/Documents/知识库/读书/笔记/📚 LLM-Wiki 整合"

note:
  template: "obsidian-three-section"            # obsidian-three-section | cornell | zettelkasten | plain
  use_wikilinks: true
  date_in_frontmatter: false

reading:
  max_words_per_session: 8000
  auto_advance_stage: false

integrations:
  weread:
    enabled: false
    api_key_env: "WEREAD_API_KEY"
    api_entry: "https://i.weread.qq.com/api/agent/gateway"
  obsidian:
    enabled: true
  wiki:
    enabled: true

cognition:
  enabled: false
  update_frequency: "chapter_end"

advanced:
  log_level: "info"
  backup_notes: true

# LLM 配置（agent.py 独立运行时使用）
# provider 留空则自动检测环境变量
# 支持的 provider: deepseek / anthropic / openai
# base_url: 自定义 API 地址（如本地 Ollama、中转站等 OpenAI 兼容接口）
# thinking: DeepSeek thinking 开关。auto 会在精读/批判/总结等深任务启用，轻量消息关闭。
llm:
  provider: ""                                # 留空 = 自动检测
  model: "deepseek-v4-pro"                    # 留空 = 使用 provider 默认模型
  api_key: ""                                 # 留空 = 从环境变量读取
  base_url: ""                                # 留空 = 使用 provider 默认地址
  thinking: "auto"                            # auto | disabled | enabled
