{% extends "base.html" %}
{% block title %}概念卡 — DeepRead Studio{% endblock %}
{% block content %}
<h1>概念卡</h1>
<button onclick="loadReport()" style="margin-bottom:12px">刷新</button>
<pre id="output" class="doctor-output">加载中...</pre>

<script>
function loadReport() {
  document.getElementById('output').textContent = '加载中...';
  fetch('/api/concepts/report').then(r => r.json()).then(d => {
    document.getElementById('output').textContent = d.output || '无输出';
  }).catch(function(e) {
    document.getElementById('output').textContent = '加载失败: ' + e;
  });
}
loadReport();
</script>
{% endblock %}
