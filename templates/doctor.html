{% extends "base.html" %}
{% block title %}健康检查 — DeepRead Studio{% endblock %}
{% block content %}
<h1>健康检查</h1>

<div class="doctor-actions">
  <button onclick="runDoctor(false)">普通检查</button>
  <button class="btn-deep" onclick="runDoctor(true)">深度检查</button>
  <span id="status-text" style="margin-left:12px;font-size:13px;color:#888"></span>
</div>

<div id="summary" class="doctor-summary" style="display:none"></div>
<pre id="output" class="doctor-output">点击按钮开始检查...</pre>

<style>
.doctor-actions { margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
</style>

<script>
function runDoctor(deep) {
  var el = document.getElementById('output');
  var st = document.getElementById('status-text');
  var sm = document.getElementById('summary');
  el.textContent = deep ? '深度检查中（可能需 10-20 秒）...' : '检查中...';
  st.textContent = '';

  var url = '/api/doctor' + (deep ? '?deep=1' : '');
  fetch(url).then(r => r.json()).then(d => {
    st.textContent = d.ok ? '' : '(有失败项)';
    el.textContent = d.output || '无输出';
    sm.style.display = 'block';

    var c = d.counts || {};
    var pass = c.pass || 0;
    var warn = c.warn || 0;
    var fail = c.fail || 0;

    var html = '<strong>检查结果: </strong>';
    html += '<span class="summary-pass">' + pass + ' PASS</span> ';
    if (warn) html += '<span class="summary-warn">' + warn + ' WARN</span> ';
    if (fail) html += '<span class="summary-fail">' + fail + ' FAIL</span> ';
    if (!fail && !warn) html += '全部通过';
    html += (deep ? ' (深度检查)' : ' (普通检查)');
    sm.innerHTML = html;
  }).catch(function(e) {
    el.textContent = '检查失败: ' + e;
    st.textContent = '';
  });
}
</script>
{% endblock %}
