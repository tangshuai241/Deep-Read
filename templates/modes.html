{% extends "base.html" %}
{% block content %}
<h1>阅读模式</h1>
<button onclick="loadModes()" style="margin-bottom:12px">刷新</button>
<pre id="output" class="doctor-output">加载中...</pre>

<script>
function loadModes() {
  document.getElementById('output').textContent = '加载中...';
  fetch('/api/modes').then(r => r.json()).then(d => {
    document.getElementById('output').textContent = d.output || '无输出';
  });
}
loadModes();
</script>
{% endblock %}
